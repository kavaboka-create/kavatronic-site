server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- точечная каноникализация дублей URL ---

  # /index.html -> /
  location = /index.html {
    return 301 /;
  }

  # /articles -> /articles/
  location = /articles {
    return 301 /articles/;
  }

  # /articles/index.html -> /articles/
  location = /articles/index.html {
    return 301 /articles/;
  }

  # --- отдача статических разделов ---

  # / -> /index.html
  location = / {
    try_files /index.html =404;
  }

  # /articles/ -> /articles/index.html
  location = /articles/ {
    try_files /articles/index.html =404;
  }

  # ассеты отдаём как есть
  location /assets/ {
    try_files $uri =404;
  }

  # остальная статика: файлы и index.html в каталогах (hubs, platform)
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
